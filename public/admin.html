<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panel de Agentes — Help Desk Inteligente</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <h1>🎫 Help Desk Inteligente</h1>
  <nav>
    <a href="index.html">Crear Ticket</a>
    <a href="admin.html" class="active">Panel de Agentes</a>
    <a href="dashboard.html">Dashboard</a>
  </nav>
</header>

<main>
  <div class="card">
    <h2>Panel de Agentes</h2>
    <p class="muted">Aquí se listan todos los tickets guardados en MongoDB Atlas, ya clasificados por el agente de IA.</p>

    <div class="actions" style="margin-bottom: 16px;">
      <select id="filtro-estado">
        <option value="">Todos los estados</option>
        <option value="abierto">Abiertos</option>
        <option value="cerrado">Cerrados</option>
      </select>
      <button class="secondary" id="btn-refrescar">🔄 Refrescar</button>
    </div>

    <div id="contenedor-tabla">
      <p class="muted">Cargando tickets...</p>
    </div>
  </div>
</main>

<script>
const contenedor = document.getElementById('contenedor-tabla');
const filtroEstado = document.getElementById('filtro-estado');
const btnRefrescar = document.getElementById('btn-refrescar');

function badge(texto, clase) {
  return `<span class="badge ${clase}">${texto}</span>`;
}

function formatearFecha(iso) {
  const d = new Date(iso);
  return d.toLocaleString('es-EC', { dateStyle: 'short', timeStyle: 'short' });
}

async function cargarTickets() {
  contenedor.innerHTML = '<p class="muted">Cargando tickets...</p>';
  try {
    const res = await fetch('/api/tickets');
    let tickets = await res.json();

    const estado = filtroEstado.value;
    if (estado) tickets = tickets.filter(t => t.estado === estado);

    if (!tickets.length) {
      contenedor.innerHTML = '<div class="empty">No hay tickets todavía.</div>';
      return;
    }

    let html = '<table><thead><tr>';
    html += '<th>Título</th><th>Prioridad</th><th>Categoría</th><th>Equipo</th><th>Estado</th><th>Creado</th><th>Acciones</th>';
    html += '</tr></thead><tbody>';

    tickets.forEach(t => {
      const prioridad = t.prioridadIA || t.prioridad || 'normal';
      html += '<tr>';
      html += `<td><strong>${t.titulo}</strong><br><span class="muted">${t.email}</span>`;
      if (t.trelloUrl) html += `<br><a class="link" href="${t.trelloUrl}" target="_blank">Ver en Trello</a>`;
      html += `</td>`;
      html += `<td>${badge(prioridad, prioridad)}</td>`;
      html += `<td>${t.categoria || '—'}</td>`;
      html += `<td>${t.equipo || '—'}</td>`;
      html += `<td>${badge(t.estado, t.estado)}</td>`;
      html += `<td class="muted">${formatearFecha(t.createdAt)}</td>`;
      html += `<td class="actions">`;
      if (t.estado === 'abierto') {
        html += `<button class="secondary" onclick="cerrarTicket('${t._id}')">Cerrar</button>`;
      } else {
        html += `<button class="secondary" onclick="reabrirTicket('${t._id}')">Reabrir</button>`;
      }
      html += `<button class="danger" onclick="eliminarTicket('${t._id}')">Eliminar</button>`;
      html += `</td></tr>`;

      if (t.respuestaIA) {
        html += `<tr><td colspan="7" class="muted">💬 Respuesta automática de la IA: ${t.respuestaIA}</td></tr>`;
      }
    });

    html += '</tbody></table>';
    contenedor.innerHTML = html;
  } catch (err) {
    contenedor.innerHTML = `<div class="resultado error">No se pudieron cargar los tickets: ${err.message}</div>`;
  }
}

async function cerrarTicket(id) {
  await fetch(`/api/tickets/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ estado: 'cerrado' }),
  });
  cargarTickets();
}

async function reabrirTicket(id) {
  await fetch(`/api/tickets/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ estado: 'abierto' }),
  });
  cargarTickets();
}

async function eliminarTicket(id) {
  if (!confirm('¿Eliminar este ticket permanentemente?')) return;
  await fetch(`/api/tickets/${id}`, { method: 'DELETE' });
  cargarTickets();
}

filtroEstado.addEventListener('change', cargarTickets);
btnRefrescar.addEventListener('click', cargarTickets);
cargarTickets();
</script>
</body>
</html>
