<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FixIA — Agent Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <span class="brand">
    <span class="logo-mark">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="34" height="34" rx="9" fill="url(#g4)"/>
        <path d="M9 13.5a2.5 2.5 0 012.5-2.5h10a2.5 2.5 0 012.5 2.5v5a2.5 2.5 0 01-2.5 2.5h-6.2l-4.3 3.1v-3.1H11.5A2.5 2.5 0 019 18.5v-5z" fill="#fff"/>
        <circle cx="13.5" cy="16" r="1.1" fill="#1D4ED8"/>
        <circle cx="17" cy="16" r="1.1" fill="#1D4ED8"/>
        <circle cx="20.5" cy="16" r="1.1" fill="#1D4ED8"/>
        <defs>
          <linearGradient id="g4" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FF6347"/>
            <stop offset="1" stop-color="#1D4ED8"/>
          </linearGradient>
        </defs>
      </svg>
    </span>
    <span class="brand-text">
      <span class="name">Fix<span>IA</span></span>
      <span class="tagline">Agent Dashboard</span>
    </span>
  </span>
  <div class="user-badge">
    <nav style="margin:0;">
      <a href="dashboard.html">📊 Estadísticas</a>
      <a href="login.html">← Portal de Usuarios</a>
    </nav>
    <button class="ghost" id="btn-logout">Cerrar sesión</button>
  </div>
</header>

<p class="page-subtitle">Gestión operativa de tickets almacenados en MongoDB Atlas.</p>

<main>
  <div class="tabs">
    <div class="tab-list">
      <button class="tab-btn active" data-tab="todos">Todos</button>
      <button class="tab-btn" data-tab="escalados">Escalados a Trello</button>
      <button class="tab-btn" data-tab="resueltos">Historial Resueltos</button>
    </div>
    <button class="dark" id="btn-refrescar">🔄 Sincronizar Datos</button>
  </div>

  <div id="contenedor-tabla">
    <p class="muted">Cargando tickets...</p>
  </div>
</main>

<!-- Modal: ver / responder ticket -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box" style="max-width:560px;">
    <div class="modal-header">
      <h2 id="modal-titulo">Ticket</h2>
      <button class="ghost" id="btn-cerrar-modal">✕</button>
    </div>

    <div class="modal-body">
    <div id="modal-detalle" class="muted" style="margin-bottom:14px;"></div>

    <div id="modal-ia-box"></div>

    <label for="respuesta-admin">Respuesta / notas del agente</label>
    <textarea id="respuesta-admin" placeholder="Escribe la respuesta que verá el usuario, o notas de verificación..."></textarea>

    <div class="actions">
      <button id="btn-guardar-abierto">Guardar respuesta</button>
      <button id="btn-guardar-cerrar" class="secondary">✓ Resolver y cerrar</button>
      <button id="btn-eliminar" class="danger">Eliminar</button>
    </div>
    </div>
  </div>
</div>

<script>
// ---------- Sesión de administrador ----------
const adminToken = localStorage.getItem('helpdesk_admin_token');
if (!adminToken) {
  window.location.href = 'admin-login.html';
}

document.getElementById('btn-logout').addEventListener('click', () => {
  localStorage.removeItem('helpdesk_admin_token');
  window.location.href = 'admin-login.html';
});

async function fetchAdmin(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: { ...(options.headers || {}), 'x-admin-token': adminToken },
  });
  if (res.status === 401) {
    localStorage.removeItem('helpdesk_admin_token');
    window.location.href = 'admin-login.html';
    throw new Error('Sesión expirada');
  }
  return res;
}

let ticketsCache = [];
let ticketActivoId = null;
let tabActiva = 'todos';

const contenedor = document.getElementById('contenedor-tabla');
const overlay = document.getElementById('modal-overlay');

function badge(texto, clase) {
  return `<span class="badge ${clase}">${texto || 'sin clasificar'}</span>`;
}

function estadoOperativo(t) {
  if (t.estado === 'cerrado') return { texto: 'Resuelto', clase: 'resuelto' };
  return { texto: 'Abierto', clase: 'pendiente' };
}

function formatearFecha(iso) {
  const d = new Date(iso);
  return d.toLocaleString('es-EC', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }).replace('.', '');
}

function filtrarPorTab(tickets) {
  if (tabActiva === 'escalados') return tickets.filter(t => Boolean(t.trelloUrl) && t.estado !== 'cerrado');
  if (tabActiva === 'resueltos') return tickets.filter(t => t.estado === 'cerrado');
  return tickets;
}

async function cargarTickets() {
  contenedor.innerHTML = '<p class="muted">Cargando tickets...</p>';
  try {
    const res = await fetchAdmin('/api/tickets');
    ticketsCache = await res.json();

    const tickets = filtrarPorTab(ticketsCache);

    if (!tickets.length) {
      contenedor.innerHTML = '<div class="card empty">No hay tickets en esta vista.</div>';
      return;
    }

    let html = '<div class="card" style="padding:0; overflow-x:auto;"><table><thead><tr>';
    html += '<th>ID (Hash)</th><th>Asunto del problema</th><th>Contacto</th><th>Prioridad IA</th><th>Estado operativo</th><th>Fecha</th><th>Acción</th>';
    html += '</tr></thead><tbody>';

    tickets.forEach(t => {
      const prioridad = t.prioridadIA;
      const estado = estadoOperativo(t);
      const hash = '...' + String(t._id).slice(-5);

      let accion;
      if (t.estado === 'cerrado') {
        accion = '<span class="muted">✓ Cerrado</span>';
      } else if (t.trelloUrl) {
        accion = '<span class="muted">En Trello</span>';
      } else {
        accion = `<button class="secondary" style="background:var(--baja); color:#fff; border:none;" onclick="event.stopPropagation(); abrirModal('${t._id}')">✓ Resolver</button>`;
      }

      html += `<tr class="ticket-row" onclick="abrirModal('${t._id}')">`;
      html += `<td class="id-hash">${hash}</td>`;
      html += `<td><strong>${t.titulo || '(sin título)'}</strong></td>`;
      html += `<td>${t.email}</td>`;
      html += `<td>${badge(prioridad, prioridad || 'media')}</td>`;
      html += `<td>${badge(estado.texto, estado.clase)}</td>`;
      html += `<td class="muted">${formatearFecha(t.createdAt)}</td>`;
      html += `<td>${accion}</td>`;
      html += `</tr>`;
    });

    html += '</tbody></table></div>';
    contenedor.innerHTML = html;
  } catch (err) {
    if (err.message !== 'Sesión expirada') {
      contenedor.innerHTML = `<div class="resultado error">No se pudieron cargar los tickets: ${err.message}</div>`;
    }
  }
}

function abrirModal(id) {
  const t = ticketsCache.find(x => x._id === id);
  if (!t) return;
  ticketActivoId = id;

  document.getElementById('modal-titulo').textContent = t.titulo || '(sin título)';
  document.getElementById('modal-detalle').innerHTML = `
    <strong>De:</strong> ${t.email}<br>
    <strong>Descripción:</strong> ${t.descripcion}<br>
    <strong>Prioridad:</strong> ${t.prioridadIA || 'sin clasificar'} · <strong>Categoría:</strong> ${t.categoria || '—'} · <strong>Equipo:</strong> ${t.equipo || '—'}
    ${t.trelloUrl ? `<br><a class="link" href="${t.trelloUrl}" target="_blank">Ver tarjeta en Trello →</a>` : ''}
  `;

  const iaBox = document.getElementById('modal-ia-box');
  iaBox.innerHTML = t.respuestaIA
    ? `<div class="respuesta-box ia"><span class="quien">Recomendación de la IA</span>${t.respuestaIA}</div>`
    : '';

  document.getElementById('respuesta-admin').value = t.respuestaAdmin || '';
  overlay.classList.add('open');
}

document.getElementById('btn-cerrar-modal').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('open'); });

async function guardarRespuesta(cerrar) {
  const respuesta = document.getElementById('respuesta-admin').value.trim();
  const cambios = { respuestaAdmin: respuesta || null };
  if (cerrar) cambios.estado = 'cerrado';

  await fetchAdmin(`/api/tickets/${ticketActivoId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(cambios),
  });

  overlay.classList.remove('open');
  cargarTickets();
}

document.getElementById('btn-guardar-abierto').addEventListener('click', () => guardarRespuesta(false));
document.getElementById('btn-guardar-cerrar').addEventListener('click', () => guardarRespuesta(true));

document.getElementById('btn-eliminar').addEventListener('click', async () => {
  if (!confirm('¿Eliminar este ticket permanentemente?')) return;
  await fetchAdmin(`/api/tickets/${ticketActivoId}`, { method: 'DELETE' });
  overlay.classList.remove('open');
  cargarTickets();
});

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tabActiva = btn.dataset.tab;
    cargarTickets();
  });
});

document.getElementById('btn-refrescar').addEventListener('click', cargarTickets);
cargarTickets();
setInterval(cargarTickets, 15000);
</script>
</body>
</html>
