<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FixIA — Mis Tickets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <span class="brand">
    <span class="logo-mark">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="34" height="34" rx="9" fill="url(#g3)"/>
        <path d="M9 13.5a2.5 2.5 0 012.5-2.5h10a2.5 2.5 0 012.5 2.5v5a2.5 2.5 0 01-2.5 2.5h-6.2l-4.3 3.1v-3.1H11.5A2.5 2.5 0 019 18.5v-5z" fill="#fff"/>
        <circle cx="13.5" cy="16" r="1.1" fill="#1D4ED8"/>
        <circle cx="17" cy="16" r="1.1" fill="#1D4ED8"/>
        <circle cx="20.5" cy="16" r="1.1" fill="#1D4ED8"/>
        <defs>
          <linearGradient id="g3" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FF6347"/>
            <stop offset="1" stop-color="#1D4ED8"/>
          </linearGradient>
        </defs>
      </svg>
    </span>
    <span class="brand-text">
      <span class="name">Fix<span>IA</span></span>
      <span class="tagline">Portal de Soporte</span>
    </span>
  </span>
  <div class="user-badge">
    <span id="user-email"></span>
    <button class="ghost" id="btn-logout">Cerrar sesión</button>
  </div>
</header>

<main>
  <div class="top-bar">
    <h2>Mis tickets</h2>
    <button id="btn-abrir-modal">+ Nuevo ticket</button>
  </div>

  <div id="contenedor-tickets">
    <p class="muted">Cargando tus tickets...</p>
  </div>
</main>

<!-- Modal: crear ticket -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <h2>Crear un nuevo ticket</h2>
      <button class="ghost" id="btn-cerrar-modal">✕</button>
    </div>
    <div class="modal-body">
    <p class="muted" style="margin-top:0;">Describe tu problema. Nuestro agente de IA lo va a leer, clasificar por prioridad y, si es necesario, escalarlo automáticamente.</p>

    <form id="form-ticket">
      <label for="titulo">Título</label>
      <input type="text" id="titulo" placeholder="Ej: No puedo acceder al sistema" required />

      <label for="descripcion">Descripción</label>
      <textarea id="descripcion" placeholder="Cuéntanos con detalle qué está pasando..." required></textarea>

      <button type="submit" id="btn-enviar" style="width:100%">🚀 Enviar Ticket</button>
    </form>

    <div id="resultado"></div>
    </div>
  </div>
</div>

<script>
// ---------- Sesión (login simple por correo, sin contraseña) ----------
const email = localStorage.getItem('helpdesk_user_email');
if (!email) {
  window.location.href = 'login.html';
}
document.getElementById('user-email').textContent = email;

document.getElementById('btn-logout').addEventListener('click', () => {
  localStorage.removeItem('helpdesk_user_email');
  window.location.href = 'login.html';
});

// ---------- Modal ----------
const overlay = document.getElementById('modal-overlay');
document.getElementById('btn-abrir-modal').addEventListener('click', () => overlay.classList.add('open'));
document.getElementById('btn-cerrar-modal').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('open'); });

// ---------- Crear ticket ----------
const form = document.getElementById('form-ticket');
const resultadoDiv = document.getElementById('resultado');
const btnEnviar = document.getElementById('btn-enviar');

function badge(texto, clase) {
  return `<span class="badge ${clase}">${texto}</span>`;
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  resultadoDiv.innerHTML = '';
  btnEnviar.disabled = true;
  btnEnviar.textContent = 'Enviando...';

  const payload = {
    titulo: document.getElementById('titulo').value.trim(),
    descripcion: document.getElementById('descripcion').value.trim(),
    email,
  };

  try {
    const res = await fetch('/api/tickets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    const data = await res.json();

    if (!res.ok) {
      resultadoDiv.innerHTML = `<div class="resultado error">❌ ${data.error || 'Ocurrió un error'}</div>`;
      return;
    }

    resultadoDiv.innerHTML = `<div class="resultado">✅ ${data.mensaje}</div>`;
    form.reset();
    cargarTickets();

    setTimeout(() => {
      overlay.classList.remove('open');
      resultadoDiv.innerHTML = '';
    }, 1600);
  } catch (err) {
    resultadoDiv.innerHTML = `<div class="resultado error">❌ No se pudo conectar con el servidor: ${err.message}</div>`;
  } finally {
    btnEnviar.disabled = false;
    btnEnviar.textContent = '🚀 Enviar Ticket';
  }
});

// ---------- Listar mis tickets ----------
const contenedor = document.getElementById('contenedor-tickets');

function formatearFecha(iso) {
  const d = new Date(iso);
  return d.toLocaleString('es-EC', { dateStyle: 'medium', timeStyle: 'short' });
}

async function cargarTickets() {
  try {
    const res = await fetch(`/api/tickets?email=${encodeURIComponent(email)}`);
    const tickets = await res.json();

    if (!tickets.length) {
      contenedor.innerHTML = '<div class="card empty">Todavía no has creado ningún ticket. Usa el botón "+ Nuevo ticket" para empezar.</div>';
      return;
    }

    contenedor.innerHTML = tickets.map((t) => {
      const prioridad = t.prioridadIA;
      let html = `<div class="ticket-item">`;
      html += `<div class="ticket-top">`;
      html += `<h3>${t.titulo}</h3>`;
      html += `<div class="meta">`;
      if (prioridad) html += badge(prioridad, prioridad);
      html += badge(t.estado, t.estado);
      html += `</div></div>`;
      html += `<p class="muted" style="margin:4px 0;">${t.descripcion}</p>`;
      html += `<p class="muted" style="margin:4px 0;">Enviado: ${formatearFecha(t.createdAt)}${t.categoria ? ` · Categoría: ${t.categoria}` : ''}</p>`;

      if (t.respuestaAdmin) {
        html += `<div class="respuesta-box admin"><span class="quien">Respuesta del agente</span>${t.respuestaAdmin}</div>`;
      } else if (t.respuestaIA) {
        html += `<div class="respuesta-box ia"><span class="quien">Recomendación de la IA</span>${t.respuestaIA}</div>`;
      } else {
        html += `<p class="muted" style="margin:8px 0 0;">⏳ Esperando revisión...</p>`;
      }

      html += `</div>`;
      return html;
    }).join('');
  } catch (err) {
    contenedor.innerHTML = `<div class="resultado error">No se pudieron cargar tus tickets: ${err.message}</div>`;
  }
}

cargarTickets();
setInterval(cargarTickets, 12000); // se refresca solo, para ver respuestas nuevas
</script>
</body>
</html>
