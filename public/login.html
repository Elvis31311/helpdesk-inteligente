<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ingresar — Help Desk Inteligente</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="logo">🎫</div>
    <h1>Help Desk Inteligente</h1>
    <p>Ingresa tu correo para crear y revisar tus tickets de soporte.</p>

    <form id="form-login">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="tucorreo@ejemplo.com" required />
      <button type="submit" style="width:100%">Continuar →</button>
    </form>

    <p class="muted" style="margin-top:14px; margin-bottom:0;">
      No se necesita contraseña: solo identificamos tus tickets con tu correo.
    </p>

    <div class="login-divider"><span>o</span></div>

    <a class="admin-link" href="admin-login.html">🔒 ¿Eres administrador? Inicia sesión aquí</a>
  </div>
</div>

<script>
// Si ya hay una sesión guardada, saltamos directo al portal.
if (localStorage.getItem('helpdesk_user_email')) {
  window.location.href = 'index.html';
}

document.getElementById('form-login').addEventListener('submit', (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  if (!email) return;
  localStorage.setItem('helpdesk_user_email', email);
  window.location.href = 'index.html';
});
</script>
</body>
</html>
