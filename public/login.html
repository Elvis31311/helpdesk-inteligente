<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IA Cenestur — Ingresar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <span class="logo-mark">
      <svg width="44" height="44" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="34" height="34" rx="9" fill="url(#g1)"/>
        <path d="M9 13.5a2.5 2.5 0 012.5-2.5h10a2.5 2.5 0 012.5 2.5v5a2.5 2.5 0 01-2.5 2.5h-6.2l-4.3 3.1v-3.1H11.5A2.5 2.5 0 019 18.5v-5z" fill="#fff"/>
        <circle cx="13.5" cy="16" r="1.1" fill="#4F46E5"/>
        <circle cx="17" cy="16" r="1.1" fill="#4F46E5"/>
        <circle cx="20.5" cy="16" r="1.1" fill="#4F46E5"/>
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse">
            <stop stop-color="#A855F7"/>
            <stop offset="1" stop-color="#06B6D4"/>
          </linearGradient>
        </defs>
      </svg>
    </span>
    <h1><span style="color:var(--ia)">IA</span> Cenestur</h1>
    <p>Ingresa tu correo para crear y revisar tus tickets de soporte.</p>

    <form id="form-login">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="tucorreo@ejemplo.com" required />
      <button type="submit" style="width:100%">Continuar →</button>
    </form>

    <p class="muted" style="margin-top:14px; margin-bottom:0;">
      No se necesita contraseña: solo identificamos tus tickets con tu correo.
    </p>

    <div class="login-divider"><span>o</span></div>

    <a class="admin-link" href="admin-login.html">🔒 ¿Eres administrador? Inicia sesión aquí</a>
  </div>
</div>

<script>
if (localStorage.getItem('helpdesk_user_email')) {
  window.location.href = 'index.html';
}

document.getElementById('form-login').addEventListener('submit', (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim().toLowerCase();
  if (!email) return;
  localStorage.setItem('helpdesk_user_email', email);
  window.location.href = 'index.html';
});
</script>
</body>
</html>
