<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>IA Cenestur — Estadísticas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <span class="brand">
    <span class="logo-mark">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="34" height="34" rx="9" fill="url(#g5)"/>
        <path d="M9 13.5a2.5 2.5 0 012.5-2.5h10a2.5 2.5 0 012.5 2.5v5a2.5 2.5 0 01-2.5 2.5h-6.2l-4.3 3.1v-3.1H11.5A2.5 2.5 0 019 18.5v-5z" fill="#fff"/>
        <circle cx="13.5" cy="16" r="1.1" fill="#4F46E5"/>
        <circle cx="17" cy="16" r="1.1" fill="#4F46E5"/>
        <circle cx="20.5" cy="16" r="1.1" fill="#4F46E5"/>
        <defs>
          <linearGradient id="g5" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse">
            <stop stop-color="#A855F7"/>
            <stop offset="1" stop-color="#06B6D4"/>
          </linearGradient>
        </defs>
      </svg>
    </span>
    <span class="brand-text">
      <span class="name"><span>IA</span> Cenestur</span>
      <span class="tagline">Agent Dashboard</span>
    </span>
  </span>
  <div class="user-badge">
    <nav style="margin:0;">
      <a href="admin.html">Todos los tickets</a>
      <a href="dashboard.html" class="active">📊 Estadísticas</a>
    </nav>
    <button class="ghost" id="btn-logout">Cerrar sesión</button>
  </div>
</header>

<main>
  <div class="card">
    <h2>Dashboard de métricas</h2>
    <p class="muted">Estadísticas en tiempo real calculadas a partir de los tickets guardados en MongoDB Atlas.</p>

    <div class="stat-grid" id="stat-grid"></div>

    <h3>Tickets por prioridad</h3>
    <div id="chart-prioridad"></div>

    <h3>Tickets por categoría</h3>
    <div id="chart-categoria"></div>
  </div>
</main>

<script>
// ---------- Sesión de administrador ----------
const adminToken = localStorage.getItem('helpdesk_admin_token');
if (!adminToken) {
  window.location.href = 'admin-login.html';
}

document.getElementById('btn-logout').addEventListener('click', () => {
  localStorage.removeItem('helpdesk_admin_token');
  window.location.href = 'admin-login.html';
});

async function cargarStats() {
  const res = await fetch('/api/stats', { headers: { 'x-admin-token': adminToken } });
  if (res.status === 401) {
    localStorage.removeItem('helpdesk_admin_token');
    window.location.href = 'admin-login.html';
    return;
  }
  const stats = await res.json();

  document.getElementById('stat-grid').innerHTML = `
    <div class="stat-box"><div class="num">${stats.total}</div><div class="label">Total</div></div>
    <div class="stat-box"><div class="num">${stats.abiertos}</div><div class="label">Abiertos</div></div>
    <div class="stat-box"><div class="num">${stats.cerrados}</div><div class="label">Cerrados</div></div>
    <div class="stat-box"><div class="num">${stats.escalados}</div><div class="label">Escalados a Trello</div></div>
  `;

  dibujarBarras('chart-prioridad', stats.porPrioridad, stats.total);
  dibujarBarras('chart-categoria', stats.porCategoria, stats.total);
}

function dibujarBarras(idContenedor, datos, total) {
  const contenedor = document.getElementById(idContenedor);
  const entradas = Object.entries(datos);

  if (!entradas.length) {
    contenedor.innerHTML = '<p class="muted">Sin datos todavía.</p>';
    return;
  }

  const max = Math.max(...entradas.map(([, cantidad]) => cantidad), 1);

  contenedor.innerHTML = entradas.map(([nombre, cantidad]) => {
    const porcentaje = Math.round((cantidad / max) * 100);
    return `
      <div class="bar-row">
        <div class="bar-label">${nombre}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${porcentaje}%"></div></div>
        <div class="bar-count">${cantidad}</div>
      </div>
    `;
  }).join('');
}

cargarStats();
setInterval(cargarStats, 15000); // se actualiza solo cada 15 segundos
</script>
</body>
</html>
