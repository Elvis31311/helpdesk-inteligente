<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Acceso de Administrador — Help Desk Inteligente</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="login-wrap">
  <div class="admin-login-card">
    <span class="badge-formal">🔒 Acceso restringido</span>
    <h1>Panel de Administrador</h1>
    <p>Ingresa tus credenciales para gestionar todos los tickets del sistema.</p>

    <form id="form-admin-login">
      <div class="field-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" autocomplete="username" required />
      </div>

      <div class="field-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" autocomplete="current-password" required />
      </div>

      <button type="submit" id="btn-login" style="width:100%">Iniciar sesión</button>
    </form>

    <div id="mensaje-error"></div>

    <a class="back-link" href="login.html">← Volver al portal de usuario</a>
  </div>
</div>

<script>
// Si ya hay una sesión de admin guardada, saltamos directo al panel.
if (localStorage.getItem('helpdesk_admin_token')) {
  window.location.href = 'admin.html';
}

const form = document.getElementById('form-admin-login');
const btn = document.getElementById('btn-login');
const mensajeError = document.getElementById('mensaje-error');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  mensajeError.innerHTML = '';
  btn.disabled = true;
  btn.textContent = 'Verificando...';

  const usuario = document.getElementById('usuario').value.trim();
  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuario, password }),
    });
    const data = await res.json();

    if (!res.ok) {
      mensajeError.innerHTML = `<div class="resultado error" style="margin-top:14px;">❌ ${data.error || 'No se pudo iniciar sesión'}</div>`;
      return;
    }

    localStorage.setItem('helpdesk_admin_token', data.token);
    localStorage.setItem('helpdesk_admin_user', usuario);
    window.location.href = 'admin.html';
  } catch (err) {
    mensajeError.innerHTML = `<div class="resultado error" style="margin-top:14px;">❌ No se pudo conectar con el servidor: ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Iniciar sesión';
  }
});
</script>
</body>
</html>
